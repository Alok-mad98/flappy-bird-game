<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // ============================================================
    // FLAPPY BIRD - Level Edition
    // Complete game engine: loading, home, gameplay, gameover
    // ============================================================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // === CONSTANTS ===
    const GAME_WIDTH = 288;
    const GAME_HEIGHT = 512;
    const GROUND_HEIGHT = 56;
    const GROUND_Y = GAME_HEIGHT - GROUND_HEIGHT;

    // Bird physics
    const GRAVITY = 0.4;
    const FLAP_FORCE = -6.5;
    const MAX_FALL_SPEED = 8;
    const BIRD_FRAME_COUNT = 4;
    const BIRD_FRAME_INTERVAL = 100; // ms
    const BIRD_SPRITE_W = 16;
    const BIRD_SPRITE_H = 16;
    const BIRD_SCALE = 2.5;
    const BIRD_DISPLAY_SIZE = BIRD_SPRITE_W * BIRD_SCALE; // 40px

    // Pipe dimensions
    const PIPE_WIDTH = 52;
    const PIPE_CAP_HEIGHT = 12;
    const PIPE_CAP_OVERHANG = 4; // how much wider the cap is on each side

    // Level points
    const POINTS_PER_LEVEL = 15;

    // === RESIZE HANDLER ===
    function resize() {
      const ratio = GAME_WIDTH / GAME_HEIGHT;
      let w = window.innerWidth;
      let h = window.innerHeight;
      if (w / h > ratio) {
        canvas.style.height = h + 'px';
        canvas.style.width = (h * ratio) + 'px';
      } else {
        canvas.style.width = w + 'px';
        canvas.style.height = (w / ratio) + 'px';
      }
      canvas.width = GAME_WIDTH;
      canvas.height = GAME_HEIGHT;
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    // === PREVENT MOBILE QUIRKS ===
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // ============================================================
    // ASSET LOADER (Task 2)
    // ============================================================
    const assets = {};
    const assetList = [];
    let assetsLoaded = 0;

    function addAsset(key, src) {
      assetList.push({ key, src });
    }

    function loadAssets() {
      return new Promise((resolve) => {
        if (assetList.length === 0) { resolve(); return; }
        assetList.forEach(({ key, src }) => {
          const img = new Image();
          img.onload = () => {
            assets[key] = img;
            assetsLoaded++;
            if (assetsLoaded === assetList.length) resolve();
          };
          img.onerror = () => {
            console.warn('Failed to load:', src);
            assetsLoaded++;
            if (assetsLoaded === assetList.length) resolve();
          };
          img.src = src;
        });
      });
    }

    // Register all assets
    // Backgrounds (9)
    for (let i = 1; i <= 9; i++) addAsset('bg' + i, 'assets/backgrounds/Background' + i + '.png');
    // Birds Style 1 (7)
    for (let i = 1; i <= 7; i++) addAsset('bird1_' + i, 'assets/birds/style1/Bird1-' + i + '.png');
    // Birds Style 2 (7)
    for (let i = 1; i <= 7; i++) addAsset('bird2_' + i, 'assets/birds/style2/Bird2-' + i + '.png');
    // Tiles (5 styles x 3 files = 15)
    for (let i = 1; i <= 5; i++) {
      addAsset('pipe' + i, 'assets/tiles/style' + i + '/PipeStyle' + i + '.png');
      addAsset('simple' + i, 'assets/tiles/style' + i + '/SimpleStyle' + i + '.png');
      addAsset('tile' + i, 'assets/tiles/style' + i + '/TileStyle' + i + '.png');
    }

    function getLoadProgress() {
      return assetList.length === 0 ? 1 : assetsLoaded / assetList.length;
    }

    // ============================================================
    // LEVEL CONFIGURATION (Task 4)
    // ============================================================

    // Pipe color palettes for fallback rectangle rendering
    // Each index maps to a display color for the pipe body + a darker cap color
    const PIPE_COLORS = [
      { body: '#4CAF50', cap: '#2E7D32' },   // 0: green
      { body: '#FF9800', cap: '#E65100' },   // 1: orange
      { body: '#2196F3', cap: '#0D47A1' },   // 2: blue
      { body: '#F44336', cap: '#B71C1C' },   // 3: red
      { body: '#9C27B0', cap: '#4A148C' },   // 4: purple
      { body: '#00BCD4', cap: '#006064' },   // 5: cyan
      { body: '#795548', cap: '#3E2723' },   // 6: brown
      { body: '#FFEB3B', cap: '#F57F17' },   // 7: yellow
    ];

    const LEVELS = [
      { bg: 'bg1', tileStyle: 1, pipeColor: 0, bird: 'bird1_1', speed: 2.0, gap: 130, spacing: 220 },
      { bg: 'bg2', tileStyle: 2, pipeColor: 1, bird: 'bird1_2', speed: 2.2, gap: 125, spacing: 210 },
      { bg: 'bg3', tileStyle: 3, pipeColor: 2, bird: 'bird1_3', speed: 2.4, gap: 120, spacing: 200 },
      { bg: 'bg4', tileStyle: 4, pipeColor: 3, bird: 'bird2_1', speed: 2.6, gap: 115, spacing: 195 },
      { bg: 'bg5', tileStyle: 5, pipeColor: 4, bird: 'bird2_2', speed: 2.8, gap: 110, spacing: 190 },
      { bg: 'bg6', tileStyle: 1, pipeColor: 5, bird: 'bird2_3', speed: 3.0, gap: 105, spacing: 185 },
      { bg: 'bg7', tileStyle: 2, pipeColor: 6, bird: 'bird1_4', speed: 3.2, gap: 100, spacing: 180 },
      { bg: 'bg8', tileStyle: 3, pipeColor: 7, bird: 'bird2_4', speed: 3.4, gap: 95,  spacing: 175 },
      { bg: 'bg9', tileStyle: 4, pipeColor: 0, bird: 'bird1_5', speed: 3.6, gap: 90,  spacing: 170 },
    ];

    // PipeStyle spritesheet layouts
    // PipeStyle1: 128x160, 4 columns of colored pipe segments
    // PipeStyle2-5: 128x96, 4 columns of colored pipe segments
    // Each column is 32px wide. Rows represent different color variants.
    // pipeColor index: row = floor(index / 4), col = index % 4
    // We use the row's top cell to tile the pipe body.
    const PIPE_LAYOUTS = {
      1: { cols: 4, cellW: 32, cellH: 32, sheetW: 128, sheetH: 160 },
      2: { cols: 4, cellW: 32, cellH: 32, sheetW: 128, sheetH: 96 },
      3: { cols: 4, cellW: 32, cellH: 32, sheetW: 128, sheetH: 96 },
      4: { cols: 4, cellW: 32, cellH: 32, sheetW: 128, sheetH: 96 },
      5: { cols: 4, cellW: 32, cellH: 32, sheetW: 128, sheetH: 96 },
    };

    function getCurrentLevel() {
      const levelIndex = Math.floor(score / POINTS_PER_LEVEL) % LEVELS.length;
      return LEVELS[levelIndex];
    }

    function getDifficulty() {
      const totalLevel = Math.floor(score / POINTS_PER_LEVEL);
      if (totalLevel < LEVELS.length) return LEVELS[totalLevel];
      // On subsequent loops, cap difficulty at level 9 values but use visual loop
      const visual = getCurrentLevel();
      return {
        bg: visual.bg,
        tileStyle: visual.tileStyle,
        pipeColor: visual.pipeColor,
        bird: visual.bird,
        speed: 3.6,
        gap: 90,
        spacing: 170
      };
    }

    function getCurrentLevelNumber() {
      return Math.floor(score / POINTS_PER_LEVEL) + 1;
    }

    // ============================================================
    // GAME STATE
    // ============================================================
    let gameState = 'loading'; // loading | home | playing | gameover

    // Score
    let score = 0;
    let pipesPassed = 0;

    // Bird state
    let bird = {
      x: 80,
      y: GAME_HEIGHT / 2,
      velocity: 0,
      frame: 0,
      frameTimer: 0,
      rotation: 0,
    };

    // Pipe state
    let pipes = [];
    let pipeSpawnTimer = 0;
    let gameStarted = false;

    // Ground scroll offset
    let groundX = 0;

    // Game over button cooldown (prevent double-tap)
    let gameOverTime = 0;
    const GAMEOVER_COOLDOWN = 300; // ms before buttons become clickable

    // Level-up flash text
    let levelUpText = '';
    let levelUpTimer = 0;
    const LEVEL_UP_DURATION = 1500; // ms to show level-up text

    // New best score detection
    let isNewBest = false;

    // ============================================================
    // AUDIO SYSTEM (Task 11)
    // ============================================================
    let audioCtx = null;
    let audioInitialized = false;
    let musicInterval = null;
    let musicGainNode = null;

    function initAudio() {
      if (audioInitialized) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioInitialized = true;
      } catch (e) {
        console.warn('Web Audio API not supported');
      }
    }

    function playSound(type) {
      if (!audioCtx || audioCtx.state === 'suspended') return;
      const now = audioCtx.currentTime;

      if (type === 'flap') {
        // Short chirp: sine wave ramping 400->800Hz over 80ms
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.1);
      }

      else if (type === 'score') {
        // Pleasant ding: triangle wave, 880Hz then 1100Hz at 50ms
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.setValueAtTime(1100, now + 0.05);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
      }

      else if (type === 'hit') {
        // Low thud: sawtooth wave, 200->50Hz over 300ms
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.3);
      }

      else if (type === 'levelUp') {
        // Ascending arpeggio: square wave, [523, 659, 784, 1047] Hz
        const notes = [523, 659, 784, 1047];
        notes.forEach(function(freq, i) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, now + i * 0.08);
          gain.gain.setValueAtTime(0, now);
          gain.gain.setValueAtTime(0.08, now + i * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.12);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + i * 0.08);
          osc.stop(now + i * 0.08 + 0.12);
        });
      }
    }

    // Background music: simple 8-bit chiptune loop
    const MUSIC_MELODY = [262, 294, 330, 294, 262, 330, 294, 262]; // C D E D C E D C
    const MUSIC_NOTE_DURATION = 0.25; // 250ms per note

    function startMusic() {
      if (!audioCtx || musicInterval) return;
      // Resume context if suspended
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      let noteIndex = 0;

      function playMusicNote() {
        if (!audioCtx || gameState === 'gameover') {
          stopMusic();
          return;
        }
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(MUSIC_MELODY[noteIndex], now);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + MUSIC_NOTE_DURATION * 0.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + MUSIC_NOTE_DURATION);
        noteIndex = (noteIndex + 1) % MUSIC_MELODY.length;
      }

      playMusicNote();
      musicInterval = setInterval(playMusicNote, MUSIC_NOTE_DURATION * 1000);
    }

    function stopMusic() {
      if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
      }
    }

    // ============================================================
    // LOADING SCREEN (Task 2)
    // ============================================================
    let loadingBirdFrame = 0;
    let loadingBirdTimer = 0;
    let loadingBobY = 0;
    let loadingBobDir = 1;

    function drawLoadingScreen(dt) {
      // Black background
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

      // Title text - gold
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('FLAPPY BIRD', GAME_WIDTH / 2, 140);

      // Animate bird bob
      loadingBirdTimer += dt;
      if (loadingBirdTimer > 150) {
        loadingBirdTimer -= 150;
        loadingBirdFrame = (loadingBirdFrame + 1) % BIRD_FRAME_COUNT;
      }
      loadingBobY += loadingBobDir * dt * 0.03;
      if (Math.abs(loadingBobY) > 10) loadingBobDir *= -1;

      const birdCenterY = 220 + loadingBobY;

      // Draw bird - use real sprite if bird1_1 has loaded, otherwise yellow placeholder
      const loadBird = assets.bird1_1;
      if (loadBird) {
        const s = 3;
        ctx.drawImage(
          loadBird,
          loadingBirdFrame * BIRD_SPRITE_W, 0, BIRD_SPRITE_W, BIRD_SPRITE_H,
          GAME_WIDTH / 2 - (BIRD_SPRITE_W * s) / 2,
          birdCenterY - (BIRD_SPRITE_H * s) / 2,
          BIRD_SPRITE_W * s, BIRD_SPRITE_H * s
        );
      } else {
        // Placeholder yellow rectangle
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(GAME_WIDTH / 2 - 20, birdCenterY - 20, 40, 40);
      }

      // Progress bar
      const progress = getLoadProgress();
      const barW = 180;
      const barH = 16;
      const barX = (GAME_WIDTH - barW) / 2;
      const barY = 320;

      // Bar background
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      // Bar fill (green)
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(barX, barY, barW * progress, barH);
      // Bar border (white)
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);

      // Percentage text
      ctx.fillStyle = '#FFF';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(Math.floor(progress * 100) + '%', GAME_WIDTH / 2, barY + barH + 8);
    }

    // ============================================================
    // HOME SCREEN (Task 3)
    // ============================================================
    let homeGroundX = 0;
    let homeBirdFrame = 0;
    let homeBirdTimer = 0;
    let homeBirdBobY = 0;
    let homeBirdBobDir = 1;
    let playBtnBounds = null;

    function drawHomeScreen(dt) {
      // Background (BG1 - orange sunset)
      const bg = assets.bg1;
      if (bg) {
        ctx.drawImage(bg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
      } else {
        ctx.fillStyle = '#E8A020';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
      }

      // Scrolling ground at bottom
      homeGroundX -= 1.5;
      const ground = assets.simple1;
      if (ground) {
        const gW = ground.width * (GROUND_HEIGHT / ground.height);
        if (homeGroundX <= -gW) homeGroundX += gW;
        for (let x = homeGroundX; x < GAME_WIDTH + gW; x += gW) {
          ctx.drawImage(ground, x, GROUND_Y, gW, GROUND_HEIGHT);
        }
      } else {
        ctx.fillStyle = '#8B6914';
        ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GROUND_HEIGHT);
      }

      // Title: "FLAPPY BIRD" with white fill + black stroke
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 36px monospace';
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#000';
      ctx.strokeText('FLAPPY BIRD', GAME_WIDTH / 2, 110);
      ctx.fillStyle = '#FFF';
      ctx.fillText('FLAPPY BIRD', GAME_WIDTH / 2, 110);

      // Animated bird
      homeBirdTimer += dt;
      if (homeBirdTimer > 150) {
        homeBirdTimer -= 150;
        homeBirdFrame = (homeBirdFrame + 1) % BIRD_FRAME_COUNT;
      }
      homeBirdBobY += homeBirdBobDir * dt * 0.04;
      if (Math.abs(homeBirdBobY) > 12) homeBirdBobDir *= -1;

      const birdImg = assets.bird1_1;
      if (birdImg) {
        const s = 3;
        const dx = GAME_WIDTH / 2 - (BIRD_SPRITE_W * s) / 2;
        const dy = 200 + homeBirdBobY - (BIRD_SPRITE_H * s) / 2;
        ctx.drawImage(
          birdImg,
          homeBirdFrame * BIRD_SPRITE_W, 0, BIRD_SPRITE_W, BIRD_SPRITE_H,
          dx, dy, BIRD_SPRITE_W * s, BIRD_SPRITE_H * s
        );
      }

      // PLAY button (green, centered)
      const btnW = 120;
      const btnH = 50;
      const btnX = (GAME_WIDTH - btnW) / 2;
      const btnY = 320;

      // Button shadow
      ctx.fillStyle = '#2E7D32';
      ctx.fillRect(btnX + 2, btnY + 3, btnW, btnH);
      // Button body
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(btnX, btnY, btnW, btnH);
      // Button border
      ctx.strokeStyle = '#1B5E20';
      ctx.lineWidth = 3;
      ctx.strokeRect(btnX, btnY, btnW, btnH);
      // Button highlight
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(btnX + 3, btnY + 3, btnW - 6, btnH / 2 - 3);
      // Button text
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeText('PLAY', GAME_WIDTH / 2, btnY + btnH / 2);
      ctx.fillText('PLAY', GAME_WIDTH / 2, btnY + btnH / 2);

      playBtnBounds = { x: btnX, y: btnY, w: btnW, h: btnH };

      // Best score display
      const best = localStorage.getItem('flappyBest');
      if (best) {
        ctx.fillStyle = '#FFF';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeText('BEST: ' + best, GAME_WIDTH / 2, 410);
        ctx.fillText('BEST: ' + best, GAME_WIDTH / 2, 410);
      }
    }

    // ============================================================
    // BIRD (Task 5)
    // ============================================================

    function resetBird() {
      bird.x = 80;
      bird.y = GAME_HEIGHT / 2;
      bird.velocity = 0;
      bird.rotation = 0;
      bird.frame = 0;
      bird.frameTimer = 0;
    }

    function flap() {
      if (gameState !== 'playing') return;

      if (!gameStarted) {
        gameStarted = true;
        spawnPipe(); // first pipe immediately
      }
      bird.velocity = FLAP_FORCE;
      playSound('flap');
    }

    function updateBird(dt) {
      if (!gameStarted) {
        // Before first tap, bird just bobs gently in place
        bird.frameTimer += dt;
        if (bird.frameTimer > BIRD_FRAME_INTERVAL) {
          bird.frameTimer -= BIRD_FRAME_INTERVAL;
          bird.frame = (bird.frame + 1) % BIRD_FRAME_COUNT;
        }
        // Gentle hover
        bird.velocity = Math.sin(Date.now() * 0.004) * 0.5;
        bird.y = GAME_HEIGHT / 2 + Math.sin(Date.now() * 0.003) * 8;
        bird.rotation = 0;
        return;
      }

      // Apply gravity
      bird.velocity += GRAVITY;
      if (bird.velocity > MAX_FALL_SPEED) bird.velocity = MAX_FALL_SPEED;
      bird.y += bird.velocity;

      // Rotation based on velocity
      if (bird.velocity < 0) {
        bird.rotation = Math.max(bird.velocity * 6, -30);
      } else {
        bird.rotation = Math.min(bird.velocity * 4, 90);
      }

      // Frame animation
      bird.frameTimer += dt;
      if (bird.frameTimer > BIRD_FRAME_INTERVAL) {
        bird.frameTimer -= BIRD_FRAME_INTERVAL;
        bird.frame = (bird.frame + 1) % BIRD_FRAME_COUNT;
      }
    }

    function drawBird() {
      const level = getCurrentLevel();
      const birdImg = assets[level.bird];
      if (!birdImg) return;

      const s = BIRD_SCALE;

      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate((bird.rotation * Math.PI) / 180);
      ctx.drawImage(
        birdImg,
        bird.frame * BIRD_SPRITE_W, 0, BIRD_SPRITE_W, BIRD_SPRITE_H,
        -(BIRD_SPRITE_W * s) / 2, -(BIRD_SPRITE_H * s) / 2,
        BIRD_SPRITE_W * s, BIRD_SPRITE_H * s
      );
      ctx.restore();
    }

    // ============================================================
    // PIPES (Task 6)
    // ============================================================

    function spawnPipe() {
      const diff = getDifficulty();
      const minTopY = 60; // minimum distance from top for gap opening
      const maxTopY = GROUND_Y - diff.gap - minTopY;
      const gapY = minTopY + Math.random() * (maxTopY - minTopY);

      pipes.push({
        x: GAME_WIDTH + 10,
        gapY: gapY,
        gapH: diff.gap,
        width: PIPE_WIDTH,
        scored: false,
      });
    }

    function updatePipes(dt) {
      if (!gameStarted) return;

      const diff = getDifficulty();
      pipeSpawnTimer += diff.speed;
      if (pipeSpawnTimer >= diff.spacing) {
        pipeSpawnTimer = 0;
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= diff.speed;

        // Score when bird center passes pipe right edge
        if (!pipes[i].scored && pipes[i].x + pipes[i].width < bird.x) {
          pipes[i].scored = true;
          score++;
          pipesPassed++;
          playSound('score');
          // Check for level change
          if (score > 0 && score % POINTS_PER_LEVEL === 0) {
            playSound('levelUp');
            levelUpText = 'LEVEL ' + getCurrentLevelNumber() + '!';
            levelUpTimer = LEVEL_UP_DURATION;
          }
        }

        // Remove off-screen pipes
        if (pipes[i].x + pipes[i].width < -20) {
          pipes.splice(i, 1);
        }
      }
    }

    function drawPipes() {
      const level = getCurrentLevel();
      const pipeSheet = assets['pipe' + level.tileStyle];
      const colorIdx = level.pipeColor;
      const colors = PIPE_COLORS[colorIdx] || PIPE_COLORS[0];

      pipes.forEach(function(pipe) {
        const topPipeBottom = pipe.gapY;
        const bottomPipeTop = pipe.gapY + pipe.gapH;

        if (pipeSheet) {
          // Try to extract pipe segment from spritesheet
          const layout = PIPE_LAYOUTS[level.tileStyle];
          // Map color index to spritesheet position
          // The spritesheet has 4 columns; each column is a distinct color variant
          // Row gives additional color variants
          const col = colorIdx % layout.cols;
          const row = Math.floor(colorIdx / layout.cols);
          const sx = col * layout.cellW;
          const sy = row * layout.cellH;

          // Validate we can extract from this sheet
          const canExtract = (sx + layout.cellW <= pipeSheet.width) &&
                             (sy + layout.cellH <= pipeSheet.height);

          if (canExtract) {
            // --- DRAW TOP PIPE (body tiled downward, cap at bottom) ---
            // Body: tile from y=0 down to gapY - capHeight
            const topBodyEnd = topPipeBottom - PIPE_CAP_HEIGHT;
            if (topBodyEnd > 0) {
              ctx.save();
              ctx.beginPath();
              ctx.rect(pipe.x, 0, pipe.width, topBodyEnd);
              ctx.clip();
              for (let y = 0; y < topBodyEnd; y += layout.cellH) {
                ctx.drawImage(
                  pipeSheet,
                  sx, sy, layout.cellW, layout.cellH,
                  pipe.x, y, pipe.width, layout.cellH
                );
              }
              ctx.restore();
            }
            // Cap at bottom of top pipe
            ctx.fillStyle = colors.cap;
            ctx.fillRect(
              pipe.x - PIPE_CAP_OVERHANG,
              topPipeBottom - PIPE_CAP_HEIGHT,
              pipe.width + PIPE_CAP_OVERHANG * 2,
              PIPE_CAP_HEIGHT
            );
            // Cap highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(
              pipe.x - PIPE_CAP_OVERHANG,
              topPipeBottom - PIPE_CAP_HEIGHT,
              pipe.width + PIPE_CAP_OVERHANG * 2,
              3
            );

            // --- DRAW BOTTOM PIPE (cap at top, body tiled downward) ---
            // Cap at top of bottom pipe
            ctx.fillStyle = colors.cap;
            ctx.fillRect(
              pipe.x - PIPE_CAP_OVERHANG,
              bottomPipeTop,
              pipe.width + PIPE_CAP_OVERHANG * 2,
              PIPE_CAP_HEIGHT
            );
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(
              pipe.x - PIPE_CAP_OVERHANG,
              bottomPipeTop,
              pipe.width + PIPE_CAP_OVERHANG * 2,
              3
            );
            // Body: tile from bottomPipeTop + capHeight down to groundY
            const bottomBodyStart = bottomPipeTop + PIPE_CAP_HEIGHT;
            if (bottomBodyStart < GROUND_Y) {
              ctx.save();
              ctx.beginPath();
              ctx.rect(pipe.x, bottomBodyStart, pipe.width, GROUND_Y - bottomBodyStart);
              ctx.clip();
              for (let y = bottomBodyStart; y < GROUND_Y; y += layout.cellH) {
                ctx.drawImage(
                  pipeSheet,
                  sx, sy, layout.cellW, layout.cellH,
                  pipe.x, y, pipe.width, layout.cellH
                );
              }
              ctx.restore();
            }
          } else {
            // Fallback to colored rectangles if sprite extraction fails
            drawPipeFallback(pipe, colors);
          }
        } else {
          // Fallback: colored rectangles
          drawPipeFallback(pipe, colors);
        }
      });
    }

    function drawPipeFallback(pipe, colors) {
      const topPipeBottom = pipe.gapY;
      const bottomPipeTop = pipe.gapY + pipe.gapH;

      // Top pipe body
      ctx.fillStyle = colors.body;
      ctx.fillRect(pipe.x, 0, pipe.width, topPipeBottom - PIPE_CAP_HEIGHT);
      // Top pipe cap
      ctx.fillStyle = colors.cap;
      ctx.fillRect(
        pipe.x - PIPE_CAP_OVERHANG,
        topPipeBottom - PIPE_CAP_HEIGHT,
        pipe.width + PIPE_CAP_OVERHANG * 2,
        PIPE_CAP_HEIGHT
      );
      // Highlight on body
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(pipe.x + 3, 0, 8, topPipeBottom - PIPE_CAP_HEIGHT);

      // Bottom pipe cap
      ctx.fillStyle = colors.cap;
      ctx.fillRect(
        pipe.x - PIPE_CAP_OVERHANG,
        bottomPipeTop,
        pipe.width + PIPE_CAP_OVERHANG * 2,
        PIPE_CAP_HEIGHT
      );
      // Bottom pipe body
      ctx.fillStyle = colors.body;
      ctx.fillRect(pipe.x, bottomPipeTop + PIPE_CAP_HEIGHT, pipe.width, GROUND_Y - bottomPipeTop - PIPE_CAP_HEIGHT);
      // Highlight on body
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(pipe.x + 3, bottomPipeTop + PIPE_CAP_HEIGHT, 8, GROUND_Y - bottomPipeTop - PIPE_CAP_HEIGHT);
    }

    // ============================================================
    // GROUND + BACKGROUND (Task 7)
    // ============================================================

    function drawBackground() {
      const level = getCurrentLevel();
      const bg = assets[level.bg];
      if (bg) {
        ctx.drawImage(bg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
      } else {
        ctx.fillStyle = '#4EC0CA';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
      }
    }

    function drawGround() {
      const level = getCurrentLevel();
      const ground = assets['simple' + level.tileStyle];

      if (ground) {
        const gW = ground.width * (GROUND_HEIGHT / ground.height);
        if (groundX <= -gW) groundX += gW;
        for (let x = groundX; x < GAME_WIDTH + gW; x += gW) {
          ctx.drawImage(ground, x, GROUND_Y, gW, GROUND_HEIGHT);
        }
      } else {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GROUND_HEIGHT);
      }
    }

    function updateGround() {
      if (!gameStarted) return;
      const diff = getDifficulty();
      groundX -= diff.speed;
    }

    // ============================================================
    // COLLISION DETECTION (Task 8)
    // ============================================================

    function checkCollision() {
      // Use 70% of display size for forgiving hitbox
      const hitboxScale = 0.7;
      const bw = BIRD_DISPLAY_SIZE * hitboxScale;
      const bh = BIRD_DISPLAY_SIZE * hitboxScale;
      const bx = bird.x - bw / 2;
      const by = bird.y - bh / 2;

      // Ground collision
      if (bird.y + bh / 2 >= GROUND_Y) return true;

      // Ceiling collision
      if (bird.y - bh / 2 <= 0) return true;

      // Pipe collision (rect-rect overlap)
      for (let i = 0; i < pipes.length; i++) {
        const pipe = pipes[i];
        // Check horizontal overlap first
        if (bx + bw > pipe.x && bx < pipe.x + pipe.width) {
          // Top pipe: from 0 to pipe.gapY
          if (by < pipe.gapY) {
            return true;
          }
          // Bottom pipe: from pipe.gapY + pipe.gapH to ground
          if (by + bh > pipe.gapY + pipe.gapH) {
            return true;
          }
        }
      }

      return false;
    }

    function die() {
      gameState = 'gameover';
      gameOverTime = performance.now();
      stopMusic();
      playSound('hit');

      // Save best score and detect new best
      const best = parseInt(localStorage.getItem('flappyBest') || '0');
      if (score > best) {
        localStorage.setItem('flappyBest', score.toString());
        isNewBest = true;
      } else {
        isNewBest = false;
      }
    }

    // ============================================================
    // HUD (Task 9)
    // ============================================================

    function drawHUD() {
      // Score - big white text with black stroke, centered near top
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 36px monospace';
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#000';
      ctx.strokeText(score.toString(), GAME_WIDTH / 2, 50);
      ctx.fillStyle = '#FFF';
      ctx.fillText(score.toString(), GAME_WIDTH / 2, 50);

      // Level indicator - top left
      const lvl = getCurrentLevelNumber();
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000';
      ctx.strokeText('LVL ' + lvl, 10, 12);
      ctx.fillStyle = '#FFF';
      ctx.fillText('LVL ' + lvl, 10, 12);
    }

    // ============================================================
    // GAMEPLAY DRAW (Task 9)
    // ============================================================

    function drawPlaying(dt) {
      // Cap delta time to prevent physics jumps on tab-switch
      const cappedDt = Math.min(dt, 50);

      // Update
      updateBird(cappedDt);
      updatePipes(cappedDt);
      updateGround();

      // Check death (only after game started with first flap)
      if (gameStarted && checkCollision()) {
        die();
        // Still draw the final frame
        drawBackground();
        drawPipes();
        drawGround();
        drawBird();
        drawHUD();
        return;
      }

      // Draw layers back to front
      drawBackground();
      drawPipes();
      drawGround();
      drawBird();
      drawHUD();

      // Level-up flash text
      if (levelUpTimer > 0) {
        levelUpTimer -= cappedDt;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 32px monospace';
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#000';
        // Pulsing scale effect
        const pulse = 1 + 0.05 * Math.sin(Date.now() * 0.01);
        const flashAlpha = Math.min(1, levelUpTimer / 300); // fade out in last 300ms
        ctx.globalAlpha = flashAlpha;
        ctx.save();
        ctx.translate(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 30);
        ctx.scale(pulse, pulse);
        ctx.strokeText(levelUpText, 0, 0);
        ctx.fillStyle = '#FFD700';
        ctx.fillText(levelUpText, 0, 0);
        ctx.restore();
        ctx.restore();
      }

      // "TAP TO START" prompt before first flap
      if (!gameStarted) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 20px monospace';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
        // Pulsing opacity
        const alpha = 0.6 + 0.4 * Math.sin(Date.now() * 0.005);
        ctx.globalAlpha = alpha;
        ctx.strokeText('TAP TO START', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 60);
        ctx.fillStyle = '#FFF';
        ctx.fillText('TAP TO START', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 60);
        ctx.restore();
      }
    }

    // ============================================================
    // GAME OVER SCREEN (Task 10)
    // ============================================================

    // Button bounds for click detection
    let retryBtnBounds = null;
    let homeBtnBounds = null;

    function drawGameOver(dt) {
      // Draw frozen game state underneath
      drawBackground();
      drawPipes();
      drawGround();
      drawBird();
      drawHUD();

      // Semi-transparent dark overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

      // === STATS PANEL ===
      const panelW = 230;
      const panelH = 280;
      const panelX = (GAME_WIDTH - panelW) / 2;
      const panelY = 95;

      // Panel shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(panelX + 4, panelY + 4, panelW, panelH);

      // Panel background
      ctx.fillStyle = '#DEB887';
      ctx.fillRect(panelX, panelY, panelW, panelH);

      // Panel border
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 3;
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      // Inner border highlight
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(panelX + 4, panelY + 4, panelW - 8, panelH - 8);

      // === GAME OVER TITLE ===
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 26px monospace';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#000';
      ctx.strokeText('GAME OVER', GAME_WIDTH / 2, panelY + 32);
      ctx.fillStyle = '#CC2222';
      ctx.fillText('GAME OVER', GAME_WIDTH / 2, panelY + 32);

      // Divider line under title
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(panelX + 15, panelY + 55);
      ctx.lineTo(panelX + panelW - 15, panelY + 55);
      ctx.stroke();

      // === STATS ROWS ===
      const statsX = panelX + 18;
      const statsValX = panelX + panelW - 18;
      let rowY = panelY + 80;
      const rowGap = 32;

      ctx.font = 'bold 16px monospace';
      ctx.lineWidth = 0;

      // Score
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#333';
      ctx.fillText('Score', statsX, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText('' + score, statsValX, rowY);

      // Best Score
      rowY += rowGap;
      const best = parseInt(localStorage.getItem('flappyBest') || '0');
      ctx.textAlign = 'left';
      ctx.fillStyle = '#333';
      ctx.fillText('Best', statsX, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = score >= best ? '#CC8800' : '#1a1a1a';
      ctx.fillText('' + best, statsValX, rowY);

      // Level Reached
      rowY += rowGap;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#333';
      ctx.fillText('Level', statsX, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText('' + getCurrentLevelNumber(), statsValX, rowY);

      // Pipes Passed
      rowY += rowGap;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#333';
      ctx.fillText('Pipes', statsX, rowY);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText('' + pipesPassed, statsValX, rowY);

      // === BUTTONS ===
      const btnW = 90;
      const btnH = 40;
      const btnGap = 16;
      const btnY = panelY + panelH - btnH - 20;
      const retryX = GAME_WIDTH / 2 - btnW - btnGap / 2;
      const homeX = GAME_WIDTH / 2 + btnGap / 2;

      // --- RETRY BUTTON (green) ---
      // Shadow
      ctx.fillStyle = '#2E7D32';
      ctx.fillRect(retryX + 2, btnY + 3, btnW, btnH);
      // Body
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(retryX, btnY, btnW, btnH);
      // Border
      ctx.strokeStyle = '#1B5E20';
      ctx.lineWidth = 2;
      ctx.strokeRect(retryX, btnY, btnW, btnH);
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(retryX + 2, btnY + 2, btnW - 4, btnH / 2 - 2);
      // Text
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 16px monospace';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000';
      ctx.strokeText('RETRY', retryX + btnW / 2, btnY + btnH / 2);
      ctx.fillStyle = '#FFF';
      ctx.fillText('RETRY', retryX + btnW / 2, btnY + btnH / 2);

      retryBtnBounds = { x: retryX, y: btnY, w: btnW, h: btnH };

      // --- HOME BUTTON (blue) ---
      // Shadow
      ctx.fillStyle = '#1565C0';
      ctx.fillRect(homeX + 2, btnY + 3, btnW, btnH);
      // Body
      ctx.fillStyle = '#2196F3';
      ctx.fillRect(homeX, btnY, btnW, btnH);
      // Border
      ctx.strokeStyle = '#0D47A1';
      ctx.lineWidth = 2;
      ctx.strokeRect(homeX, btnY, btnW, btnH);
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(homeX + 2, btnY + 2, btnW - 4, btnH / 2 - 2);
      // Text
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 16px monospace';
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000';
      ctx.strokeText('HOME', homeX + btnW / 2, btnY + btnH / 2);
      ctx.fillStyle = '#FFF';
      ctx.fillText('HOME', homeX + btnW / 2, btnY + btnH / 2);

      homeBtnBounds = { x: homeX, y: btnY, w: btnW, h: btnH };

      // NEW BEST! flashing text
      if (isNewBest) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 20px monospace';
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';
        // Flashing effect: oscillate alpha
        const flashAlpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.008);
        ctx.globalAlpha = flashAlpha;
        ctx.strokeText('NEW BEST!', GAME_WIDTH / 2, panelY - 18);
        ctx.fillStyle = '#FFD700';
        ctx.fillText('NEW BEST!', GAME_WIDTH / 2, panelY - 18);
        ctx.restore();
      }
    }

    function handleGameOverClick(x, y) {
      // Prevent double-tap: ignore clicks within cooldown period after death
      if (performance.now() - gameOverTime < GAMEOVER_COOLDOWN) return;

      // Check RETRY button
      if (retryBtnBounds &&
          x >= retryBtnBounds.x && x <= retryBtnBounds.x + retryBtnBounds.w &&
          y >= retryBtnBounds.y && y <= retryBtnBounds.y + retryBtnBounds.h) {
        gameState = 'playing';
        resetGame();
        startMusic();
        return;
      }
      // Check HOME button
      if (homeBtnBounds &&
          x >= homeBtnBounds.x && x <= homeBtnBounds.x + homeBtnBounds.w &&
          y >= homeBtnBounds.y && y <= homeBtnBounds.y + homeBtnBounds.h) {
        gameState = 'home';
        startMusic();
        return;
      }
    }

    // ============================================================
    // GAME RESET
    // ============================================================

    function resetGame() {
      resetBird();
      pipes = [];
      score = 0;
      pipesPassed = 0;
      groundX = 0;
      pipeSpawnTimer = 0;
      gameStarted = false;
      levelUpTimer = 0;
      levelUpText = '';
      isNewBest = false;
    }

    function startGame() {
      initAudio();
      gameState = 'playing';
      resetGame();
      startMusic();
    }

    function goHome() {
      gameState = 'home';
    }

    // ============================================================
    // INPUT HANDLING
    // ============================================================

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = GAME_WIDTH / rect.width;
      const scaleY = GAME_HEIGHT / rect.height;

      let clientX, clientY;
      if (e.type === 'touchstart' || e.type === 'touchend') {
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
          clientX = e.changedTouches[0].clientX;
          clientY = e.changedTouches[0].clientY;
        } else {
          return null;
        }
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function handlePointerInput(e) {
      e.preventDefault();

      const coords = getCanvasCoords(e);
      if (!coords) return;

      if (gameState === 'home') {
        if (playBtnBounds &&
            coords.x >= playBtnBounds.x &&
            coords.x <= playBtnBounds.x + playBtnBounds.w &&
            coords.y >= playBtnBounds.y &&
            coords.y <= playBtnBounds.y + playBtnBounds.h) {
          startGame();
        }
      } else if (gameState === 'playing') {
        flap();
      } else if (gameState === 'gameover') {
        handleGameOverClick(coords.x, coords.y);
      }
    }

    canvas.addEventListener('mousedown', handlePointerInput);
    canvas.addEventListener('touchstart', handlePointerInput, { passive: false });

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'home') {
          startGame();
        } else if (gameState === 'playing') {
          flap();
        } else if (gameState === 'gameover') {
          if (performance.now() - gameOverTime >= GAMEOVER_COOLDOWN) {
            startGame();
          }
        }
      }
      if (e.code === 'KeyH' && gameState === 'gameover') {
        goHome();
        startMusic();
      }
    });

    // ============================================================
    // MAIN GAME LOOP
    // ============================================================

    let lastTime = 0;

    function gameLoop(timestamp) {
      let dt = lastTime ? timestamp - lastTime : 16;
      lastTime = timestamp;

      // Cap delta time to prevent physics jumps
      dt = Math.min(dt, 50);

      ctx.imageSmoothingEnabled = false;

      switch (gameState) {
        case 'loading':
          drawLoadingScreen(dt);
          break;
        case 'home':
          drawHomeScreen(dt);
          break;
        case 'playing':
          drawPlaying(dt);
          break;
        case 'gameover':
          drawGameOver(dt);
          break;
      }

      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // START
    // ============================================================

    loadAssets().then(function() {
      // Brief pause after reaching 100% to let the user see it
      setTimeout(function() {
        gameState = 'home';
      }, 500);
    });

    requestAnimationFrame(gameLoop);

  </script>
</body>
